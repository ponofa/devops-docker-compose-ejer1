<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <span class="navbar-brand">Dashboard</span>
    <button class="btn btn-outline-light btn-sm" onclick="logout()">Salir</button>
  </div>
</nav>

<div class="container">
  <h3 class="mb-4">Estadísticas</h3>
  <div id="content" class="row g-3">
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Usuarios</h5>
          <p id="users" class="card-text fs-4">-</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Ventas</h5>
          <p id="sales" class="card-text fs-4">-</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Uptime</h5>
          <p id="uptime" class="card-text fs-4">-</p>
        </div>
      </div>
    </div>
  </div>
  <div id="msg" class="mt-3 text-danger small"></div>
</div>

<script>
function logout() {
  localStorage.removeItem('token');
  window.location.href = '/';
}

async function loadDashboard() {
  const msg = document.getElementById('msg');
  msg.textContent = '';

  try {
    const res = await fetch('/api/dashboard');
    if (!res.ok) {
      msg.textContent = 'No se pudo cargar el dashboard';
      return;
    }
    const data = await res.json();
    document.getElementById('users').textContent = data.stats.users;
    document.getElementById('sales').textContent = data.stats.sales;
    document.getElementById('uptime').textContent = data.stats.uptime;
  } catch (e) {
    msg.textContent = 'Error de conexión con la API';
  }
}

loadDashboard();
</script>
</body>
</html>
