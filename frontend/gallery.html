<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Gallery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
        <body class="bg-light">

        
            <div class="container mt-4">
                <div class="row">

                <div class="col-md-4">
                    <img src="" class="img-fluid rounded" alt="Imagen 1" id="img1">
                </div>

                <div class="col-md-4">
                    <img src="" class="img-fluid rounded" alt="Imagen 2" id="img2">
                </div>

                <div class="col-md-4">
                    <img src="" class="img-fluid rounded" alt="Imagen 3" id="img3">
                </div>

                </div>
        </div>

        <div id="msg" class="mt-3 text-danger small"></div>

        <script>

        async function loadImages() {
        const msg = document.getElementById('msg');
        msg.textContent = '';

        try {
            const res = await fetch('/api/galeria');
            if (!res.ok) {
                msg.textContent = 'No se pudo cargar la galeria';
                return;
            }
            const data = await res.json();
            document.getElementById('img1').src = data.images[0];
            document.getElementById('img2').src = data.images[1];
            document.getElementById('img3').src = data.images[2];            
        } catch (e) {
            msg.textContent = 'Error de conexión con la API';
        }
        }

        loadImages();
        </script>

    </body>
</html>
