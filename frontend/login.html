<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height:100vh;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card shadow">
          <div class="card-body">
            <h4 class="card-title mb-3 text-center">Login DevOps</h4>
            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input id="user" class="form-control" value="admin">
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input id="pass" type="password" class="form-control" value="1234">
            </div>
            <button class="btn btn-primary w-100" onclick="login()">Ingresar</button>
            <div id="msg" class="mt-3 text-danger small"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
async function login() {
  const user = document.getElementById('user').value;
  const pass = document.getElementById('pass').value;
  const msg = document.getElementById('msg');
  msg.textContent = '';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, pass })
    });

    if (!res.ok) {
      msg.textContent = 'Credenciales inválidas';
      return;
    }

    const data = await res.json();
    // Demo: guardamos token en localStorage y vamos al dashboard
    localStorage.setItem('token', data.token);
    window.location.href = '/dashboard.html';
  } catch (e) {
    msg.textContent = 'Error de conexión con la API';
  }
}
</script>
</body>
</html>
